name: Apply Tattoo Prehab v6 account release

on:
  push:
    branches: [main]
    paths:
      - '.v6-account-release/**'
      - '.github/workflows/apply-v6-account-release.yml'

permissions:
  contents: write

concurrency:
  group: tattoo-prehab-v6-account-release
  cancel-in-progress: true

jobs:
  apply-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Reconstruct and apply verified account patches
        shell: bash
        run: |
          set -euo pipefail

          cat \
            .v6-account-release/payload/00 \
            .v6-account-release/payload/01 \
            .v6-account-release/payload/02 \
            .v6-account-release/payload/030 \
            .v6-account-release/payload/031 \
            .v6-account-release/payload/032 \
            .v6-account-release/payload/04 \
            .v6-account-release/payload/05 \
            .v6-account-release/payload/06 \
            .v6-account-release/payload/07 \
            | base64 --decode > /tmp/tattoo-prehab-v6-tracked.patch.xz
          echo 'efd2a259a829b892e59c350b0aec31fad800f621d1f291fa2c3e8cdd4d826c3c  /tmp/tattoo-prehab-v6-tracked.patch.xz' | sha256sum -c -
          xz --decompress --stdout /tmp/tattoo-prehab-v6-tracked.patch.xz > /tmp/tattoo-prehab-v6-tracked.patch
          git apply --check /tmp/tattoo-prehab-v6-tracked.patch
          git apply --whitespace=nowarn /tmp/tattoo-prehab-v6-tracked.patch

          cat \
            .v6-account-release/newfiles/00 \
            .v6-account-release/newfiles/01 \
            .v6-account-release/newfiles/02 \
            .v6-account-release/newfiles/03 \
            .v6-account-release/newfiles/04 \
            .v6-account-release/newfiles/05 \
            | base64 --decode > /tmp/tattoo-prehab-v6-new-files.patch.xz
          echo 'a6147dfe4238848ba87e94358b680c0cda50279ad51cd1a926a26347c228ece8  /tmp/tattoo-prehab-v6-new-files.patch.xz' | sha256sum -c -
          xz --decompress --stdout /tmp/tattoo-prehab-v6-new-files.patch.xz > /tmp/tattoo-prehab-v6-new-files.patch
          git apply --check /tmp/tattoo-prehab-v6-new-files.patch
          git apply --whitespace=nowarn /tmp/tattoo-prehab-v6-new-files.patch

          echo 'eb6b25f6a95028c6b8a7a1d41657e6efcf2ffc76aad78e29cda1089f9b67b02d  .v6-account-release/fixes/progress-store.patch' | sha256sum -c -
          git apply --check .v6-account-release/fixes/progress-store.patch
          git apply --whitespace=nowarn .v6-account-release/fixes/progress-store.patch

      - name: Update dependencies and database migration
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run db:generate

      - name: Run complete Node 24 release gates
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/v6-account-build.log

      - name: Upload failed release log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v6-account-build-log-${{ github.run_id }}
          path: /tmp/v6-account-build.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Commit exact account release
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .v6-account-release
          rm -f .github/workflows/apply-v6-account-release.yml
          rm -rf app/api/release-tree app/api/release-actions
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add account login and cloud progress'
          git push origin HEAD:main
