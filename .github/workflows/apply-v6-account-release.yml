name: Apply Tattoo Prehab v6 account release

on:
  push:
    branches:
      - main
    paths:
      - '.v6-account-release/**'
      - '.github/workflows/apply-v6-account-release.yml'

permissions:
  contents: write

concurrency:
  group: tattoo-prehab-v6-account-release
  cancel-in-progress: false

jobs:
  apply-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staged main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify staging contains no application changes
        shell: bash
        run: |
          set -euo pipefail
          expected='b3d79d9dd7c7cab48cef6161d747881ac269a37d'
          git merge-base --is-ancestor "$expected" HEAD
          git diff --exit-code "$expected" HEAD -- . \
            ':(exclude).v6-account-release/**' \
            ':(exclude).github/workflows/apply-v6-account-release.yml'

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Reconstruct and apply verified account patch
        shell: bash
        run: |
          set -euo pipefail
          cat .v6-account-release/patch/* | base64 --decode > /tmp/tattoo-prehab-v6-auth.patch.xz
          echo 'efd2a259a829b892e59c350b0aec31fad800f621d1f291fa2c3e8cdd4d826c3c  /tmp/tattoo-prehab-v6-auth.patch.xz' | sha256sum -c -
          xz --decompress --stdout /tmp/tattoo-prehab-v6-auth.patch.xz > /tmp/tattoo-prehab-v6-auth.patch
          git apply --check /tmp/tattoo-prehab-v6-auth.patch
          git apply --whitespace=nowarn /tmp/tattoo-prehab-v6-auth.patch

      - name: Update dependencies and database migration
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run db:generate

      - name: Run complete Node 24 release gates
        run: npm run build

      - name: Commit exact account release to main
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .v6-account-release
          rm -f .github/workflows/apply-v6-account-release.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add account login and cloud progress'
          git push origin HEAD:main
