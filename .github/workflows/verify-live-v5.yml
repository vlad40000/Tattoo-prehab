name: Verify live Tattoo Prehab v5

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-live-v5.yml'

permissions:
  contents: write

concurrency:
  group: tattoo-prehab-live-v5
  cancel-in-progress: false

jobs:
  live-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Confirm production health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error https://tattoo-prehab.vercel.app/api/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run production browser flows
        shell: bash
        run: |
          cat > playwright.live.config.ts <<'CONFIG'
          import { defineConfig, devices } from '@playwright/test';

          export default defineConfig({
            testDir: './e2e',
            timeout: 30_000,
            fullyParallel: true,
            retries: 2,
            reporter: 'github',
            use: {
              baseURL: 'https://tattoo-prehab.vercel.app',
              trace: 'on-first-retry',
            },
            projects: [
              {
                name: 'ipad-portrait-live',
                use: {
                  ...devices['iPad Pro 11'],
                  browserName: 'chromium',
                  viewport: { width: 1024, height: 1366 },
                },
              },
              {
                name: 'ipad-landscape-live',
                use: {
                  ...devices['iPad Pro 11 landscape'],
                  browserName: 'chromium',
                  viewport: { width: 1366, height: 1024 },
                },
              },
            ],
          });
          CONFIG
          npx playwright test --config=playwright.live.config.ts
          rm playwright.live.config.ts

      - name: Record successful live verification
        shell: bash
        run: |
          set -euo pipefail
          cat > LIVE_VERIFICATION.md <<EOF
          # Tattoo Prehab v5 live verification

          Production URL: https://tattoo-prehab.vercel.app
          Source commit tested: ${GITHUB_SHA}
          Node runtime: 24
          Browser: Chromium
          Viewports: 1024x1366 and 1366x1024
          Result: PASS

          Verified flows:
          - readiness branching and symptom redirection
          - Train navigation and eight-minute routine selection
          - guided session start, set completion, stop rules, pause, resume, restart, and discard controls
          - Learn library shows 33 exercises, five region groups, and 21 approved video guides
          - no instructional iframe mounts before user action
          EOF

          rm -f .github/workflows/verify-live-v5.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record Tattoo Prehab v5 live browser verification'
          git push origin HEAD:main
